<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCPE Plugins - Sistema de Gestión</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #050505 0%, #111111 50%, #050505 100%);
            min-height: 100vh;
            position: relative;
        }

        .particles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            animation: float linear infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) scale(1);
                opacity: 0;
            }
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
            padding: 20px;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(15, 15, 15, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        .logo h1 {
            color: #ffffff;
            font-size: 24px;
            background: linear-gradient(135deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo p {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
        }

        .nav-buttons {
            display: flex;
            gap: 15px;
        }

        .nav-btn {
            padding: 10px 25px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 600;
        }

        .nav-btn.active {
            background: #ffffff;
            color: #000000;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(15, 15, 15, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 25px;
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .stat-title {
            color: rgba(255, 255, 255, 0.5);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .stat-value {
            color: #ffffff;
            font-size: 36px;
            font-weight: 700;
        }

        /* Form Section */
        .form-section, .plugins-section {
            background: rgba(15, 15, 15, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            animation: fadeIn 0.5s ease;
        }

        .section-title {
            color: #ffffff;
            font-size: 24px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: rgba(255, 255, 255, 0.6);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        input, textarea {
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: #ffffff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }

        input:focus, textarea:focus {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 0 4px rgba(255, 255, 255, 0.1);
        }

        .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #ffffff;
            color: #000000;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(255, 255, 255, 0.2);
        }

        /* Plugins Grid */
        .plugins-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .plugin-card {
            background: rgba(25, 25, 25, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .plugin-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .plugin-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }

        .plugin-name {
            color: #ffffff;
            font-size: 18px;
            font-weight: 600;
        }

        .plugin-version {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.7);
        }

        .plugin-desc {
            color: rgba(255, 255, 255, 0.6);
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 15px;
        }

        .plugin-meta {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }

        .download-link {
            display: inline-block;
            width: 100%;
            padding: 10px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            color: #ffffff;
            text-align: center;
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .download-link:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .delete-btn {
            width: 100%;
            padding: 8px;
            background: rgba(255, 50, 50, 0.2);
            border: 1px solid rgba(255, 50, 50, 0.3);
            border-radius: 8px;
            color: #ff6b6b;
            text-align: center;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .delete-btn:hover {
            background: rgba(255, 50, 50, 0.4);
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: rgba(255, 255, 255, 0.4);
        }

        .search-box {
            margin-bottom: 20px;
        }

        .search-box input {
            padding: 12px 15px;
            font-size: 14px;
        }

        .status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 13px;
            z-index: 1000;
            opacity: 0;
            transform: translateX(100%);
            transition: all 0.3s ease;
        }

        .status.show {
            opacity: 1;
            transform: translateX(0);
        }

        .status.success {
            background: rgba(0, 255, 100, 0.2);
            border: 1px solid rgba(0, 255, 100, 0.5);
            color: #00ff88;
        }

        .status.error {
            background: rgba(255, 50, 50, 0.2);
            border: 1px solid rgba(255, 50, 50, 0.5);
            color: #ff6b6b;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }
            .row {
                grid-template-columns: 1fr;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="particles" id="particles"></div>
    <div class="main-container">
        <!-- Header -->
        <div class="header">
            <div class="logo">
                <h1>🎮 MCPE Plugins Manager</h1>
                <p>Gestiona y comparte plugins para Minecraft Pocket Edition</p>
            </div>
            <div class="nav-buttons">
                <button class="nav-btn active" onclick="switchView('dashboard')">📊 Dashboard</button>
                <button class="nav-btn" onclick="switchView('plugins')">📦 Ver Plugins</button>
                <button class="nav-btn" onclick="switchView('upload')">➕ Subir Plugin</button>
            </div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboardView">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-title">Total Plugins</div>
                    <div class="stat-value" id="totalPlugins">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Descargas Totales</div>
                    <div class="stat-value" id="totalDownloads">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Último Plugin</div>
                    <div class="stat-value" id="lastPlugin" style="font-size: 18px;">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-title">Versiones MCPE</div>
                    <div class="stat-value" id="versionsCount" style="font-size: 18px;">-</div>
                </div>
            </div>

            <div class="form-section">
                <div class="section-title">📋 Plugins Recientes</div>
                <div id="recentPluginsList" class="plugins-grid" style="max-height: 400px; overflow-y: auto;"></div>
            </div>
        </div>

        <!-- Plugins View (Público) -->
        <div id="pluginsView" style="display: none;">
            <div class="plugins-section">
                <div class="section-title">🎯 Todos los Plugins Disponibles</div>
                <div class="search-box">
                    <input type="text" id="searchPlugins" placeholder="🔍 Buscar plugin por nombre o descripción...">
                </div>
                <div id="publicPluginsList" class="plugins-grid"></div>
            </div>
        </div>

        <!-- Upload View -->
        <div id="uploadView" style="display: none;">
            <div class="form-section">
                <div class="section-title">📤 Subir Nuevo Plugin</div>
                <form id="uploadForm">
                    <div class="form-group">
                        <label>NOMBRE DEL PLUGIN *</label>
                        <input type="text" id="pluginName" placeholder="Ej: EssentialsX, CombatPlus" required>
                    </div>
                    <div class="row">
                        <div class="form-group">
                            <label>VERSIÓN *</label>
                            <input type="text" id="pluginVersion" placeholder="1.0.0" required>
                        </div>
                        <div class="form-group">
                            <label>VERSIÓN MCPE *</label>
                            <select id="mcpeVersion" required style="width: 100%; padding: 14px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; color: white;">
                                <option value="1.20">1.20+</option>
                                <option value="1.19">1.19+</option>
                                <option value="1.18">1.18+</option>
                                <option value="1.17">1.17+</option>
                                <option value="1.16">1.16+</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>DESCRIPCIÓN CORTA *</label>
                        <textarea id="pluginDesc" placeholder="Describe brevemente qué hace este plugin..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label>URL DE DESCARGA *</label>
                        <input type="url" id="downloadUrl" placeholder="https://example.com/plugin.phar" required>
                    </div>
                    <button type="submit" class="submit-btn">🚀 PUBLICAR PLUGIN</button>
                </form>
            </div>
        </div>
    </div>

    <div id="status" class="status"></div>

    <script>
        // Generar partículas
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 50; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDuration = (10 + Math.random() * 20) + 's';
            particle.style.animationDelay = Math.random() * 15 + 's';
            particlesContainer.appendChild(particle);
        }

        // Base de datos local
        const STORAGE_KEY = 'mcpe_plugins_db';
        let plugins = [];
        let totalDownloads = 0;

        // Cargar datos iniciales
        function loadData() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                const data = JSON.parse(stored);
                plugins = data.plugins || [];
                totalDownloads = data.totalDownloads || 0;
            }
            
            if (plugins.length === 0) {
                // Plugins de ejemplo
                plugins = [
                    {
                        id: '1',
                        name: 'EssentialsX',
                        version: '2.19.5',
                        mcpeVersion: '1.20',
                        description: 'Plugin esencial con comandos básicos, protección de spawn y economía para tu servidor',
                        downloadUrl: 'https://example.com/essentialsx.phar',
                        date: new Date().toISOString(),
                        downloads: 245
                    },
                    {
                        id: '2',
                        name: 'CombatPlus',
                        version: '1.5.2',
                        mcpeVersion: '1.19',
                        description: 'Mejora el sistema de combate con habilidades especiales y efectos personalizados',
                        downloadUrl: 'https://example.com/combatplus.phar',
                        date: new Date(Date.now() - 86400000).toISOString(),
                        downloads: 128
                    },
                    {
                        id: '3',
                        name: 'ChestShop',
                        version: '3.8.1',
                        mcpeVersion: '1.20',
                        description: 'Sistema de tiendas en cofres para que los jugadores comercien fácilmente',
                        downloadUrl: 'https://example.com/chestshop.phar',
                        date: new Date(Date.now() - 172800000).toISOString(),
                        downloads: 189
                    }
                ];
                saveData();
            }
            updateDashboard();
        }

        function saveData() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({
                plugins: plugins,
                totalDownloads: totalDownloads
            }));
        }

        function updateDashboard() {
            document.getElementById('totalPlugins').textContent = plugins.length;
            document.getElementById('totalDownloads').textContent = totalDownloads;
            
            if (plugins.length > 0) {
                const lastPlugin = plugins.sort((a, b) => new Date(b.date) - new Date(a.date))[0];
                document.getElementById('lastPlugin').textContent = lastPlugin.name;
                document.getElementById('lastPlugin').style.fontSize = '18px';
            }
            
            const uniqueVersions = [...new Set(plugins.map(p => p.mcpeVersion))];
            document.getElementById('versionsCount').textContent = uniqueVersions.join(', ');
            
            // Mostrar plugins recientes en dashboard
            const recentPlugins = [...plugins].sort((a, b) => new Date(b.date) - new Date(a.date)).slice(0, 4);
            const recentContainer = document.getElementById('recentPluginsList');
            if (recentPlugins.length === 0) {
                recentContainer.innerHTML = '<div class="empty-state">No hay plugins aún</div>';
            } else {
                recentContainer.innerHTML = recentPlugins.map(plugin => `
                    <div class="plugin-card">
                        <div class="plugin-header">
                            <div class="plugin-name">${escapeHtml(plugin.name)}</div>
                            <div class="plugin-version">v${plugin.version}</div>
                        </div>
                        <div class="plugin-desc">${escapeHtml(plugin.description.substring(0, 80))}${plugin.description.length > 80 ? '...' : ''}</div>
                        <div class="plugin-meta">
                            <span>📱 MCPE ${plugin.mcpeVersion}</span>
                            <span>⬇️ ${plugin.downloads} descargas</span>
                        </div>
                    </div>
                `).join('');
            }
        }

        function renderPublicPlugins(searchTerm = '') {
            const container = document.getElementById('publicPluginsList');
            let filteredPlugins = plugins;
            
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                filteredPlugins = plugins.filter(p => 
                    p.name.toLowerCase().includes(term) || 
                    p.description.toLowerCase().includes(term)
                );
            }
            
            if (filteredPlugins.length === 0) {
                container.innerHTML = '<div class="empty-state">📭 No hay plugins disponibles</div>';
                return;
            }
            
            container.innerHTML = filteredPlugins.map(plugin => `
                <div class="plugin-card">
                    <div class="plugin-header">
                        <div class="plugin-name">${escapeHtml(plugin.name)}</div>
                        <div class="plugin-version">v${plugin.version}</div>
                    </div>
                    <div class="plugin-desc">${escapeHtml(plugin.description)}</div>
                    <div class="plugin-meta">
                        <span>📱 MCPE ${plugin.mcpeVersion}</span>
                        <span>📅 ${formatDate(plugin.date)}</span>
                        <span>⬇️ ${plugin.downloads} descargas</span>
                    </div>
                    <a href="${plugin.downloadUrl}" class="download-link" target="_blank" onclick="trackDownload('${plugin.id}')">
                        ⬇️ DESCARGAR PLUGIN
                    </a>
                </div>
            `).join('');
        }

        function trackDownload(pluginId) {
            const plugin = plugins.find(p => p.id === pluginId);
            if (plugin) {
                plugin.downloads = (plugin.downloads || 0) + 1;
                totalDownloads++;
                saveData();
                updateDashboard();
                showStatus(`📥 Descargando ${plugin.name}...`, true);
                
                // Actualizar vista actual si es necesario
                if (document.getElementById('pluginsView').style.display !== 'none') {
                    renderPublicPlugins(document.getElementById('searchPlugins').value);
                }
            }
        }

        function addPlugin(event) {
            event.preventDefault();
            
            const name = document.getElementById('pluginName').value.trim();
            const version = document.getElementById('pluginVersion').value.trim();
            const mcpeVersion = document.getElementById('mcpeVersion').value;
            const description = document.getElementById('pluginDesc').value.trim();
            const downloadUrl = document.getElementById('downloadUrl').value.trim();
            
            if (!name || !version || !description || !downloadUrl) {
                showStatus('❌ Por favor completa todos los campos', false);
                return;
            }
            
            try {
                new URL(downloadUrl);
            } catch(e) {
                showStatus('❌ Ingresa una URL válida', false);
                return;
            }
            
            const newPlugin = {
                id: Date.now().toString(),
                name: name,
                version: version,
                mcpeVersion: mcpeVersion,
                description: description,
                downloadUrl: downloadUrl,
                date: new Date().toISOString(),
                downloads: 0
            };
            
            plugins.unshift(newPlugin);
            saveData();
            updateDashboard();
            
            document.getElementById('uploadForm').reset();
            showStatus('✅ ¡Plugin publicado exitosamente!', true);
            
            // Cambiar a vista de plugins para ver el resultado
            setTimeout(() => {
                switchView('plugins');
                renderPublicPlugins();
            }, 1500);
        }

        function deletePlugin(pluginId) {
            if (confirm('¿Eliminar este plugin permanentemente?')) {
                const plugin = plugins.find(p => p.id === pluginId);
                if (plugin) {
                    totalDownloads -= plugin.downloads || 0;
                }
                plugins = plugins.filter(p => p.id !== pluginId);
                saveData();
                updateDashboard();
                showStatus('🗑️ Plugin eliminado correctamente', true);
                
                if (document.getElementById('pluginsView').style.display !== 'none') {
                    renderPublicPlugins(document.getElementById('searchPlugins').value);
                }
            }
        }

        function switchView(view) {
            document.getElementById('dashboardView').style.display = view === 'dashboard' ? 'block' : 'none';
            document.getElementById('pluginsView').style.display = view === 'plugins' ? 'block' : 'none';
            document.getElementById('uploadView').style.display = view === 'upload' ? 'block' : 'none';
            
            const btns = document.querySelectorAll('.nav-btn');
            btns.forEach((btn, index) => {
                if ((view === 'dashboard' && index === 0) ||
                    (view === 'plugins' && index === 1) ||
                    (view === 'upload' && index === 2)) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
            
            if (view === 'plugins') {
                renderPublicPlugins(document.getElementById('searchPlugins').value);
            }
            if (view === 'dashboard') {
                updateDashboard();
            }
        }

        function showStatus(message, isSuccess) {
            const statusEl = document.getElementById('status');
            statusEl.textContent = message;
            statusEl.className = `status show ${isSuccess ? 'success' : 'error'}`;
            setTimeout(() => {
                statusEl.classList.remove('show');
            }, 3000);
        }

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const now = new Date();
            const diffTime = Math.abs(now - date);
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            if (diffDays === 1) return 'hace 1 día';
            if (diffDays < 7) return `hace ${diffDays} días`;
            return date.toLocaleDateString('es-ES');
        }

        // Inicializar
        loadData();
        
        // Event listeners
        document.getElementById('uploadForm').addEventListener('submit', addPlugin);
        document.getElementById('searchPlugins').addEventListener('input', (e) => {
            renderPublicPlugins(e.target.value);
        });
    </script>
</body>
</html>
